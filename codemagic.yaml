workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android AAB
        script: flutter build appbundle --debug
    artifacts:
      - build/app/outputs/bundle/debug/app-debug.aab
