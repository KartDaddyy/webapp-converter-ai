workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug --android-skip-build-dependency-validation
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
